# spageth xatu observer config. Pass with --xatu.config.
# Every eth handshake (inbound and outbound, successful or rejected) is exported
# as a NODE_RECORD_EXECUTION event to the xatu server named below.

name: spageth
version: 1.0.0
implementation: spageth
loggingLevel: info

# Attached to every event's client meta. Free-form.
labels:
  region: syd1

ethereum:
  network:
    # Human-friendly name; becomes the ClickHouse partition key. The numeric id
    # is taken from each peer's Status at emit time.
    name: mainnet

# Optional. Emit a MEMPOOL_TRANSACTION_V2 event the first time this node sees
# each transaction over the wire, deduplicated by hash (first-seen-per-tx, not
# per-peer). Off by default; node records work unchanged when this is omitted.
mempool:
  enabled: true
  # Bounds the first-seen dedup cache by number of tx hashes; older entries are
  # evicted LRU-style to cap memory. Defaults to 1000000 when unset.
  cacheSize: 1000000

output:
  address: xatu.example.internal:8080
  tls: true
  headers:
    # xatu accepts Basic auth only.
    Authorization: "Basic <base64(user:pass)>"
  # Batching / retry defaults are inherited from the xatu output client and can
  # be overridden here (maxQueueSize, batchTimeout, maxExportBatchSize, workers,
  # retry, keepAlive).
