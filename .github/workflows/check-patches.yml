name: check-patches

# Rebuilds spageth against the latest upstream go-ethereum every day. If the
# patch no longer applies cleanly, this goes red and a human regenerates it
# with scripts/save-patch.sh. If a 3-way merge succeeds, the regenerated patch
# is committed back automatically.
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        ref: [master]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Build against upstream ${{ matrix.ref }}
        id: build
        run: scripts/spageth-build.sh --ref "${{ matrix.ref }}"

      - name: Detect patch drift
        id: drift
        run: |
          scripts/save-patch.sh
          if ! git diff --quiet -- "patches/ethereum/go-ethereum/${{ matrix.ref }}/base.patch"; then
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          UPSTREAM_REF: ${{ matrix.ref }}

      - name: Commit regenerated patch
        if: steps.drift.outputs.drifted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "patches/ethereum/go-ethereum/${{ matrix.ref }}/base.patch"
          git commit -m "chore: regenerate patch for upstream ${{ matrix.ref }} drift [skip ci]"
          git push
