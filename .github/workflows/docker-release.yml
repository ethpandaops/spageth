name: docker-release

# Builds and pushes the spageth image to GitHub Container Registry on a version
# tag or manual dispatch. Uses the built-in GITHUB_TOKEN — no registry secrets.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream go-ethereum ref to build"
        default: "master"

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          ref="${{ github.event.inputs.upstream_ref || 'master' }}"
          version="${GITHUB_REF_NAME:-latest}"
          echo "tags=${IMAGE}:${version}-${ref},${IMAGE}:${ref},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/Dockerfile
          # amd64 only: the deployment targets (Hetzner) are amd64, and an
          # emulated arm64 geth build under QEMU takes the better part of an
          # hour. Add arm64 back with a native runner if it's ever needed.
          platforms: linux/amd64
          push: true
          build-args: |
            UPSTREAM_REF=${{ steps.meta.outputs.ref }}
            XATU_VERSION=latest
          tags: ${{ steps.meta.outputs.tags }}
